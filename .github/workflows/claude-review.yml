name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - functional-test
      - "release/**"

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} 2>/dev/null \
            | head -n 400 > /tmp/pr_diff.txt
          LINES=$(wc -l < /tmp/pr_diff.txt)
          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "Captured $LINES lines"

      - name: Run Claude review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 .github/scripts/claude_review.py

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW: ${{ steps.review.outputs.review }}
          DIFF_LINES: ${{ steps.diff.outputs.lines }}
        run: |
          NOTE=""
          if [ "${DIFF_LINES:-0}" -ge 400 ]; then
            NOTE="> Diff was large - review based on first 400 lines only."
          fi
          BODY=$(printf "## Claude Code Review\n\n%s%s\n\n---\n*Automated review by Claude Sonnet. Maintainer approval required.*" "$NOTE" "$REVIEW")
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
